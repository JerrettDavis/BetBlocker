name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: betblocker_test
          POSTGRES_USER: betblocker
          POSTGRES_PASSWORD: betblocker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://betblocker:betblocker_test@localhost:5432/betblocker_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres
      - name: Run migrations
        run: sqlx migrate run --source migrations
      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Build all crates
        run: cargo build --workspace

  docker-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile.api
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/docker/Dockerfile.api

      - name: Lint Dockerfile.worker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/docker/Dockerfile.worker

      - name: Lint Dockerfile.web
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/docker/Dockerfile.web

      - name: Lint Dockerfile.agent-linux
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/docker/Dockerfile.agent-linux
