name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            api
            worker
            agent
            web
            site
            cli
            linux
            windows
            macos
            android
            ios
            ci
            docker
            deps
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must not be empty after the type/scope prefix."
