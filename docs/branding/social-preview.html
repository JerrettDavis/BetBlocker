<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=640">
<title>BetBlocker Social Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0F172A;
    color: #F8FAFC;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    height: 100%;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid pattern background */
  .container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(79, 70, 229, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79, 70, 229, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Gradient glow */
  .container::after {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .top {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .shield {
    width: 64px;
    height: 64px;
    flex-shrink: 0;
  }

  .brand-name {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .brand-name .bet {
    color: #818CF8;
  }

  .middle {
    position: relative;
    z-index: 1;
  }

  .tagline {
    font-size: 32px;
    font-weight: 600;
    color: #F8FAFC;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 20px;
    color: #94A3B8;
    font-weight: 400;
    max-width: 700px;
    line-height: 1.5;
  }

  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }

  .stats {
    display: flex;
    gap: 40px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #818CF8;
  }

  .stat-label {
    font-size: 14px;
    color: #94A3B8;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .badges {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .badge {
    padding: 8px 16px;
    border-radius: 9999px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .badge-oss {
    background: rgba(16, 185, 129, 0.15);
    color: #10B981;
    border: 1px solid rgba(16, 185, 129, 0.3);
  }

  .badge-free {
    background: rgba(79, 70, 229, 0.15);
    color: #818CF8;
    border: 1px solid rgba(79, 70, 229, 0.3);
  }

  /* Shield divider line */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(79, 70, 229, 0.3), transparent);
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="top">
      <!-- Inline SVG shield -->
      <svg class="shield" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2 L28 7.5 C28 7.5 29 18 26 24 C23 30 16 31 16 31 C16 31 9 30 6 24 C3 18 4 7.5 4 7.5 Z" fill="#4F46E5"/>
        <rect x="9" y="13" width="14" height="3.5" rx="1" fill="#FFFFFF"/>
        <rect x="11" y="8.5" width="10" height="2.5" rx="0.75" fill="#FFFFFF" opacity="0.7"/>
        <rect x="11" y="18.5" width="10" height="2.5" rx="0.75" fill="#FFFFFF" opacity="0.7"/>
      </svg>
      <span class="brand-name"><span class="bet">Bet</span>Blocker</span>
    </div>

    <div class="middle">
      <div class="tagline">Block the bet, not the bettor.</div>
      <div class="subtitle">Open-source, cross-platform gambling blocking built for recovery. Privacy-first. Tamper-resistant. Free forever.</div>
    </div>

    <div class="divider"></div>

    <div class="bottom">
      <div class="stats">
        <div class="stat">
          <span class="stat-value">15+</span>
          <span class="stat-label">Crates</span>
        </div>
        <div class="stat">
          <span class="stat-value">5</span>
          <span class="stat-label">Platforms</span>
        </div>
        <div class="stat">
          <span class="stat-value">500+</span>
          <span class="stat-label">Tests</span>
        </div>
      </div>
      <div class="badges">
        <span class="badge badge-free">Free & Self-Hostable</span>
        <span class="badge badge-oss">Open Source</span>
      </div>
    </div>
  </div>
</body>
</html>
