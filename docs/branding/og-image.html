<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=630">
<title>BetBlocker OG Image</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0F172A;
    color: #F8FAFC;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* Left content area */
  .content {
    flex: 1;
    padding: 64px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 28px;
    position: relative;
    z-index: 1;
  }

  /* Right decorative area */
  .visual {
    width: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Large background shield glow */
  .visual::before {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(79, 70, 229, 0.2) 0%, transparent 70%);
  }

  .big-shield {
    width: 180px;
    height: 180px;
    position: relative;
    z-index: 1;
    opacity: 0.9;
  }

  /* Subtle grid overlay */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(79, 70, 229, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79, 70, 229, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    z-index: 0;
  }

  /* Top gradient line */
  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #4F46E5, #818CF8, #4F46E5);
    z-index: 2;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-shield {
    width: 48px;
    height: 48px;
  }

  .brand-name {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .brand-name .bet { color: #818CF8; }
  .brand-name .blocker { color: #F8FAFC; }

  .tagline {
    font-size: 28px;
    font-weight: 600;
    color: #E2E8F0;
    line-height: 1.3;
    max-width: 580px;
  }

  .description {
    font-size: 18px;
    color: #94A3B8;
    line-height: 1.5;
    max-width: 540px;
  }

  .pills {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 9999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .pill-indigo {
    background: rgba(79, 70, 229, 0.15);
    color: #818CF8;
    border: 1px solid rgba(79, 70, 229, 0.3);
  }

  .pill-emerald {
    background: rgba(16, 185, 129, 0.15);
    color: #10B981;
    border: 1px solid rgba(16, 185, 129, 0.3);
  }

  .pill-slate {
    background: rgba(148, 163, 184, 0.1);
    color: #94A3B8;
    border: 1px solid rgba(148, 163, 184, 0.2);
  }

  .url {
    font-size: 15px;
    color: #64748B;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="content">
      <div class="logo-row">
        <svg class="logo-shield" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 2 L28 7.5 C28 7.5 29 18 26 24 C23 30 16 31 16 31 C16 31 9 30 6 24 C3 18 4 7.5 4 7.5 Z" fill="#4F46E5"/>
          <rect x="9" y="13" width="14" height="3.5" rx="1" fill="#FFFFFF"/>
          <rect x="11" y="8.5" width="10" height="2.5" rx="0.75" fill="#FFFFFF" opacity="0.7"/>
          <rect x="11" y="18.5" width="10" height="2.5" rx="0.75" fill="#FFFFFF" opacity="0.7"/>
        </svg>
        <span class="brand-name"><span class="bet">Bet</span><span class="blocker">Blocker</span></span>
      </div>

      <div class="tagline">Block the bet, not the bettor.</div>

      <div class="description">
        Open-source, cross-platform gambling blocking built for recovery. Privacy-first. Tamper-resistant.
      </div>

      <div class="pills">
        <span class="pill pill-emerald">Free & Open Source</span>
        <span class="pill pill-indigo">5 Platforms</span>
        <span class="pill pill-indigo">Rust + Next.js</span>
        <span class="pill pill-slate">Self-Hostable</span>
      </div>

      <div class="url">betblocker.com</div>
    </div>

    <div class="visual">
      <svg class="big-shield" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2 L28 7.5 C28 7.5 29 18 26 24 C23 30 16 31 16 31 C16 31 9 30 6 24 C3 18 4 7.5 4 7.5 Z" fill="#4F46E5"/>
        <rect x="9" y="13" width="14" height="3.5" rx="1" fill="#FFFFFF"/>
        <rect x="11" y="8.5" width="10" height="2.5" rx="0.75" fill="#FFFFFF" opacity="0.7"/>
        <rect x="11" y="18.5" width="10" height="2.5" rx="0.75" fill="#FFFFFF" opacity="0.7"/>
      </svg>
    </div>
  </div>
</body>
</html>
